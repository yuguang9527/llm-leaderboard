wandb:
  run_name: google/gemini-3-flash-preview
api: google # openai, anthropic, google,..
batch_size: 4
inference_interval: 2
model:
  pretrained_model_name_or_path: gemini-3-flash-preview # if you use Google Gemini API, put the exact model name
  bfcl_model_id: "gemini-3-flash-preview-FC" # Flash Preview 専用の BFCL モデル ID（handler は Pro と共通）
  base_model: "unknown"
  size_category: api
  size: null
  # Gemini 3 Pro preview: public information around 2025-11-20 (mm/dd/yyyy)
  release_date: 11/20/2025
  # reasoning（思考トークン）を最大限使う: -1 は「モデル上限まで無制限」を意味
  thinking_budget: -1
  safety_settings:
    - category: "HARM_CATEGORY_HATE_SPEECH"
      threshold: "BLOCK_NONE"
    - category: "HARM_CATEGORY_SEXUALLY_EXPLICIT"
      threshold: "BLOCK_NONE"
    - category: "HARM_CATEGORY_DANGEROUS_CONTENT"
      threshold: "BLOCK_NONE"
    - category: "HARM_CATEGORY_HARASSMENT"
      threshold: "BLOCK_NONE"
    - category: "HARM_CATEGORY_CIVIC_INTEGRITY"
      threshold: "BLOCK_NONE"

generator: # LLM client default configuration: to be overridden by each benchmark
  max_tokens: 65000

jaster:
  override_max_tokens: 65000 # if null, use value defined in task dataset files

jbbq:
  generator_config:
    max_tokens: 65000

toxicity:
  generator_config:
    max_tokens: 65000

jtruthfulqa:
  generator_config:
    max_tokens: 65000

swebench:
  max_tokens: 65000

mtbench:
  generator_config:
    max_tokens: 65000

bfcl:
  generator_config:
    max_tokens: 65000

hallulens:
  generator_config:
    max_tokens: 65000

hle:
  generator_config:
    max_tokens: 65000

arc_agi:
  max_output_tokens: 65000

m_ifeval:
  generator_config:
    max_tokens: 65000