wandb:
  run_name: "anthropic/claude-haiku-4-5-20251001: extended-thinking"
api: openai-compatible # openai, anthropic, google,..
base_url: https://openrouter.ai/api/v1
batch_size: 32
model:
  pretrained_model_name_or_path: anthropic/claude-haiku-4.5
  bfcl_model_id: OpenRouter-FC
  base_model: "unknown"
  size_category: api
  size: null
  release_date: 10/16/2025

generator:
  max_tokens: 180000
  parallel_tool_calls: true
  extra_body:
    reasoning:
      effort: high

jaster:
  override_max_tokens: 180000

jbbq:
  generator_config:
    max_tokens: 180000

toxicity:
  generator_config:
    max_tokens: 180000

jtruthfulqa:
  generator_config:
    max_tokens: 180000

mtbench:
  max_new_token: 180000

bfcl:
  generator_config:
    max_tokens: 180000

hallulens:
  generator_config:
    max_tokens: 180000

hle:
  max_completion_tokens: 180000

arc_agi:
  max_output_tokens: 180000

m_ifeval:
  generator_config:
    max_tokens: 180000

swebench:
  max_tokens: 180000
  artifacts_path: 'horangi/horangi4-dataset/swebench_verified_official_80:v2' 
  dataset_dir: '.'
  background_eval: true
  api_server:
    enabled: true
    endpoint: 'https://api.nejumi-swebench.org'

run:
  bfcl: false
  swebench: true
  mtbench: false
  jbbq: false
  toxicity: false
  jtruthfulqa: false
  hle: false
  hallulens: false
  arc_agi: false
  m_ifeval: false
  jaster: false
  jmmlu_robustness: false # if this is set as true, jaster should set as true  
  aggregate: false